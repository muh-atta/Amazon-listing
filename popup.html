<!DOCTYPE html>
<html lang="en">
<head>
    <title>Amazon Listing</title>
    <link rel="icon" type="image/svg+xml" href="logo.jpg" />
    <style>
      body {
        margin: 0;
        padding: 10px;
        font-family: Arial, sans-serif;
        min-width: 120px;
        min-height: 70px;
      }
      #status {
        padding: 10px;
        font-weight: bold;
        text-align: center;
        color: white;
        border-radius: 5px;
      }
      #toggleBtn{
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin-top: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
      }
      #toggleBtn:hover{
        background-color: azure;
      }
    </style>
</head>
<body>
    <div id="status">Checking...</div>
    <button id="toggleBtn">Start</button>
    <script src="popup.js"></script>
</body>
</html>
